          <article class="card">
            <h3>Introduction</h3>
            <p>This group presentation examines how machine learning and deep learning are reshaping retail and e-commerce. It compares traditional machine learning for structured demand forecasting with deep learning for unstructured visual search and explains how data type, business needs, cost, and interpretability should guide algorithm selection.</p>

            <h3>Objective</h3>
            <p>The objective was to evaluate when retailers should use machine learning and when deep learning is the stronger choice. The analysis considers data structure, model complexity, training requirements, explainability, computing cost, business value, and ethical risk.</p>

            <h3>My Role and Contributions</h3>
            <p>I served as the <strong>Comparativist and Strategist</strong>. I developed the head-to-head comparison of the two approaches, evaluated crossover possibilities and trade-offs, created the recommended retail AI adoption roadmap, and presented the ethical analysis involving consumer privacy, algorithmic price discrimination, bias, manipulation, in-store surveillance, transparency, fairness audits, and human oversight.</p>

            <h3>Real-World Applications</h3>
            <p>Walmart demand forecasting demonstrates why tree-based machine learning models are effective for structured sales, pricing, calendar, weather, and inventory data. Alibaba's Pailitao visual-search platform demonstrates why convolutional neural networks are more appropriate for complex, unstructured image data at billion-image scale.</p>

            <h3>Key Finding</h3>
            <p>The right algorithm is the one the data demands. Traditional machine learning is generally the better starting point for structured retail data because it is efficient, explainable, and economical. Deep learning earns its additional cost when the business value is hidden in complex unstructured data such as images.</p>

            <h3>Professional Value</h3>
            <p>This artifact demonstrates my ability to compare AI methods critically, connect technical model selection to business strategy, interpret peer-reviewed research, evaluate cost and explainability trade-offs, develop an AI adoption roadmap, collaborate within a multidisciplinary team, and advocate for responsible AI implementation.</p>

            <p><a class="button blue" href="artifact2.html">Explore the Complete Artifact 2 Analysis</a></p>
          </article>

          <aside class="card">
