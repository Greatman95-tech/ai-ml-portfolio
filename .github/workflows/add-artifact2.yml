  <header><div class="container"><span class="eyebrow">Artifact 2</span><h1>Machine Learning vs. Deep Learning Industry Analysis</h1><p>Retail &amp; E-Commerce | A comparative analysis of demand forecasting, visual search, business strategy, and responsible AI adoption.</p></div></header>
  <main><div class="container">
    <section class="card"><h2>Artifact Overview</h2><p>This artifact originated as a collaborative presentation for Machine Learning Fundamentals at Indiana Wesleyan University. The team analyzed the retail and e-commerce data landscape and compared two real-world problems that demand fundamentally different AI approaches.</p><p><strong>My role:</strong> Comparativist + Strategist. I was responsible for the head-to-head analysis, crossover and trade-off evaluation, adoption recommendation, emerging-trends discussion, and ethical reflection.</p></section>

    <div class="grid">
      <section class="card"><h2>Machine Learning Case</h2><h3>Walmart Demand Forecasting</h3><p>Retailers must forecast demand across thousands of products and locations while keeping models efficient, scalable, and understandable to supply-chain planners. Tree ensembles such as gradient boosting, random forests, and XGBoost are effective because they work well with structured, feature-driven data.</p><p><span class="tag">Structured data</span><span class="tag">Tree ensembles</span><span class="tag">Feature importance</span><span class="tag">Efficient retraining</span></p></section>
      <section class="card"><h2>Deep Learning Case</h2><h3>Alibaba Pailitao Visual Search</h3><p>Visual search must match casual phone photographs with billions of product images despite changes in lighting, background, orientation, and style. Convolutional neural networks learn visual representations automatically and bridge the semantic gap between a customer image and catalog listings.</p><p><span class="tag">Unstructured images</span><span class="tag">CNNs</span><span class="tag">Feature embeddings</span><span class="tag">Billion-scale retrieval</span></p></section>
    </div>

    <section class="card"><h2>Head-to-Head Comparison</h2><table class="comparison"><thead><tr><th>Dimension</th><th>Machine Learning: Demand Forecasting</th><th>Deep Learning: Visual Search</th></tr></thead><tbody><tr><td>Data type</td><td>Structured sales, price, calendar, weather, and inventory data</td><td>Unstructured product and customer images</td></tr><tr><td>Approach</td><td>Gradient boosting, random forests, and related tree ensembles</td><td>Deep convolutional neural networks with learned embeddings</td></tr><tr><td>Interpretability</td><td>Higher; feature importance and SHAP can explain forecasts</td><td>Lower; learned representations are more difficult to interpret</td></tr><tr><td>Compute and cost</td><td>Lower; CPU-friendly and economical to retrain</td><td>Higher; requires GPUs, extensive data, and specialized expertise</td></tr><tr><td>Best fit</td><td>Feature-driven prediction on structured business data</td><td>Complex pattern recognition in images and other unstructured data</td></tr></tbody></table></section>

    <section class="card"><h2>Strategic Recommendation</h2><p>A retailer beginning its AI journey should start with traditional machine learning on structured data. This approach can deliver explainable quick wins, establish trust, and build the data foundation needed for more complex systems.</p><div class="roadmap"><div class="phase"><b>Phase 1: ML Quick Wins</b>Demand forecasting, churn prediction, pricing, and other structured-data use cases.</div><div class="phase"><b>Phase 2: Scale and Data</b>Unify customer, inventory, and clickstream data while establishing MLOps discipline.</div><div class="phase"><b>Phase 3: Deep Learning</b>Invest in visual search, computer vision, and multimodal AI when unstructured data provides measurable value.</div></div></section>

