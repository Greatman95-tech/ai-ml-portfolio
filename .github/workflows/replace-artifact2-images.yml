name: Replace Artifact 2 With Slide Images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/replace-artifact2-images.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild Artifact 2 from uploaded slide image data
        shell: bash
        run: |
          python - <<'PYCODE'
          from pathlib import Path
          import base64, zlib, io, math, shutil
          from PIL import Image

          payloads = {
            'index.html': '',
            'artifact2.html': '',
            'styles.css': '',
          }
          for name, payload in payloads.items():
              Path(name).write_bytes(zlib.decompress(base64.b64decode(payload)))

          chunk_dir = Path('artifact2_upload')
          chunks = [chunk_dir / 'chunk01.txt', chunk_dir / 'chunk02.txt']
          raw_b64 = ''.join(p.read_text().strip() for p in chunks)
          image_bytes = base64.b64decode(raw_b64)
          image = Image.open(io.BytesIO(image_bytes)).convert('RGB')
          w, h = image.size
          out = Path('assets/artifact2')
          out.mkdir(parents=True, exist_ok=True)

          for p in out.glob('slide*'):
              p.unlink()

          slide_ratio = 16 / 9
          crops = []
          if h / w > 3:
              cell_h = round(w / slide_ratio)
              count = max(1, round(h / cell_h))
              for i in range(count):
                  top = round(i * h / count)
                  bottom = round((i + 1) * h / count)
                  crops.append(image.crop((0, top, w, bottom)))
          elif w / h > 3:
              cell_w = round(h * slide_ratio)
              count = max(1, round(w / cell_w))
              for i in range(count):
                  left = round(i * w / count)
                  right = round((i + 1) * w / count)
                  crops.append(image.crop((left, 0, right, h)))
          else:
              candidates = [(1,14),(2,7),(7,2),(14,1)]
              cols, rows = min(candidates, key=lambda cr: abs((w/cr[0])/(h/cr[1]) - slide_ratio))
              for r in range(rows):
                  for c in range(cols):
                      left = round(c * w / cols); right = round((c + 1) * w / cols)
                      top = round(r * h / rows); bottom = round((r + 1) * h / rows)
                      crops.append(image.crop((left, top, right, bottom)))

          if len(crops) < 14:
              raise RuntimeError(f'Expected at least 14 slides, found {len(crops)} from image size {w}x{h}')
          for i, slide in enumerate(crops[:14], start=1):
              slide.save(out / f'slide{i:02d}.jpg', quality=92, optimize=True)

          page = Path('artifact2.html').read_text()
          import re
          page = re.sub(r'assets/artifact2/slide\d{2}-[^" ]+\.png', lambda m: f"assets/artifact2/slide{int(re.search(r'slide(\d{2})', m.group()).group(1)):02d}.jpg", page)
          Path('artifact2.html').write_text(page)

          shutil.rmtree(chunk_dir, ignore_errors=True)
          workflow = Path('.github/workflows/replace-artifact2-images.yml')
          if workflow.exists():
              workflow.unlink()
          PYCODE

      - name: Commit updated portfolio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace Artifact 2 with converted slide images" || exit 0
          git push
