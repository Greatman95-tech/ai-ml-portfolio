name: Fix Artifact 2 Slide Gallery

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-artifact2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-artifact2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install image support
        run: python -m pip install --quiet pillow

      - name: Rebuild Artifact 2 using the converted slide images
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          import base64
          import io
          import shutil

          chunk_dir = Path('artifact2_upload')
          chunk_files = [chunk_dir / 'chunk01.txt', chunk_dir / 'chunk02.txt']
          missing = [str(path) for path in chunk_files if not path.exists()]
          if missing:
              raise FileNotFoundError(f'Missing uploaded slide-image data: {missing}')

          raw_b64 = ''.join(path.read_text(encoding='utf-8').strip() for path in chunk_files)
          source = Image.open(io.BytesIO(base64.b64decode(raw_b64))).convert('RGB')
          width, height = source.size
          slide_ratio = 16 / 9
          slides = []

          if height / width > 3:
              slide_height = round(width / slide_ratio)
              count = max(1, round(height / slide_height))
              for index in range(count):
                  top = round(index * height / count)
                  bottom = round((index + 1) * height / count)
                  slides.append(source.crop((0, top, width, bottom)))
          elif width / height > 3:
              slide_width = round(height * slide_ratio)
              count = max(1, round(width / slide_width))
              for index in range(count):
                  left = round(index * width / count)
                  right = round((index + 1) * width / count)
                  slides.append(source.crop((left, 0, right, height)))
          else:
              layouts = [(1, 14), (2, 7), (7, 2), (14, 1)]
              columns, rows = min(
                  layouts,
                  key=lambda layout: abs((width / layout[0]) / (height / layout[1]) - slide_ratio),
              )
              for row in range(rows):
                  for column in range(columns):
                      left = round(column * width / columns)
                      right = round((column + 1) * width / columns)
                      top = round(row * height / rows)
                      bottom = round((row + 1) * height / rows)
                      slides.append(source.crop((left, top, right, bottom)))

          if len(slides) < 14:
              raise RuntimeError(f'Expected 14 slides but detected only {len(slides)} from {width}x{height}.')

          output = Path('assets/artifact2')
          shutil.rmtree(output, ignore_errors=True)
          output.mkdir(parents=True, exist_ok=True)
          for number, slide in enumerate(slides[:14], start=1):
              slide.save(output / f'slide{number:02d}.jpg', format='JPEG', quality=94, optimize=True)

          captions = [
              'Retail & E-Commerce — ML vs. Deep Learning Industry Analysis',
              'Data Landscape & Operational Challenges',
              'How AI Is Already Transforming Retail',
              'Traditional ML: Forecasting Demand at Walmart',
              'Why Traditional ML Fits This Problem',
              'Deep Learning: Visual Search at Alibaba',
              'Why Deep Learning Is the Best Approach',
              'Head-to-Head: Two Problems, Two Tools',
              'Could They Swap? Crossovers & Trade-Offs',
              'Strategy: Start with ML, Grow into DL',
              'Ethical Reflection: Innovation with Responsibility',
              'Tools Used & AI Disclosure',
              'References',
              'Closing Takeaway',
          ]

          figures = '\n'.join(
              f'''<figure class="slide"><img src="assets/artifact2/slide{number:02d}.jpg" alt="Slide {number}: {caption}" loading="lazy"><figcaption>Slide {number}: {caption}</figcaption></figure>'''
              for number, caption in enumerate(captions, start=1)
          )

          html = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Artifact 2 | ML vs. Deep Learning Industry Analysis</title>
            <style>
              :root{{--navy:#07172f;--blue:#1e4f91;--gold:#f4c84a;--ink:#182033;--muted:#64748b;--line:#dbe4f0;--soft:#eef4ff;}}
              *{{box-sizing:border-box}}
              html{{scroll-behavior:smooth}}
              body{{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(180deg,#f8fbff,#eef4ff);line-height:1.6}}
              a{{color:var(--blue);font-weight:800;text-decoration:none}}
              a:hover{{text-decoration:underline}}
              nav{{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);box-shadow:0 8px 24px rgba(15,23,42,.07)}}
              .nav{{max-width:1240px;margin:auto;padding:15px 24px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}}
              .brand{{display:flex;align-items:center;gap:10px;color:var(--navy)}}
              .mark{{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--navy),var(--gold));color:white;font-weight:900}}
              header{{background:linear-gradient(135deg,#07172f,#173f78);color:white;padding:60px 24px}}
              .container{{max-width:1240px;margin:auto}}
              .eyebrow{{display:inline-block;color:var(--gold);font-weight:900;letter-spacing:.13em;text-transform:uppercase;font-size:.82rem}}
              h1{{font-size:clamp(2.35rem,5vw,4.6rem);line-height:1.05;margin:14px 0 18px}}
              header p{{max-width:900px;color:#e5eefc;font-size:1.08rem}}
              .role{{display:inline-block;margin-top:10px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.24);font-weight:800}}
              main{{padding:46px 24px 72px}}
              .intro{{background:white;border:1px solid var(--line);border-radius:22px;padding:25px;box-shadow:0 16px 42px rgba(15,23,42,.09);margin-bottom:28px}}
              .gallery{{display:grid;gap:28px}}
              .slide{{margin:0;background:white;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 16px 42px rgba(15,23,42,.10)}}
              .slide img{{display:block;width:100%;height:auto}}
              .slide figcaption{{padding:15px 20px;color:var(--navy);font-weight:800}}
              footer{{background:var(--navy);color:#cbd5e1;text-align:center;padding:30px 20px}}
              @media(max-width:700px){{header{{padding-top:45px}}main{{padding-left:12px;padding-right:12px}}.slide{{border-radius:14px}}}}
            </style>
          </head>
          <body>
            <nav><div class="nav"><a class="brand" href="/ai-ml-portfolio/"><span class="mark">AI</span>Obiajuru Nwadiokwu</a><a href="/ai-ml-portfolio/#artifact2">Back to Portfolio</a></div></nav>
            <header><div class="container"><span class="eyebrow">Artifact 2</span><h1>ML vs. Deep Learning Industry Analysis</h1><p>Retail &amp; E-Commerce — the original presentation displayed as converted slide images.</p><span class="role">My Role: Comparativist + Strategist</span></div></header>
            <main><div class="container"><section class="intro"><h2>Presentation Gallery</h2><p>This page presents the complete 14-slide artifact exactly in its visual presentation format. Scroll to review each slide.</p></section><div class="gallery">{figures}</div></div></main>
            <footer>&copy; 2026 Obiajuru Triumph Nwadiokwu. Professional AI/ML Portfolio.</footer>
          </body>
          </html>'''
          Path('artifact2.html').write_text(html, encoding='utf-8')

          shutil.rmtree(chunk_dir, ignore_errors=True)
          for workflow in [
              Path('.github/workflows/replace-artifact2-images.yml'),
              Path('.github/workflows/fix-artifact2.yml'),
          ]:
              if workflow.exists():
                  workflow.unlink()
          PY

      - name: Commit corrected Artifact 2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Display Artifact 2 as converted slide images"
          git push
